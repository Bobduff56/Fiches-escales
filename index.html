<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Fiches d'escales</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        header {
            background-color: #1e3d59;
            color: white;
            padding: 25px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 2em; }
        header p { margin: 5px 0 0 0; opacity: 0.9; }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
        }

        /* Barre de recherche & Sommaire */
        .search-box {
            width: 100%;
            padding: 12px 15px;
            font-size: 1.1em;
            border: 2px solid #d2e6ee;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus {
            border-color: #1e3d59;
        }
        .accueil-box {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid #1e3d59;
        }
        .accueil-box h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.3em;
            color: #1e3d59;
        }
        .liens-terrain {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }
        .btn-raccourci {
            display: block;
            background-color: #e8f4f8;
            color: #1e3d59;
            text-decoration: none;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid #d2e6ee;
        }
        .btn-raccourci:hover {
            background-color: #1e3d59;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Fiches d'escales */
        .escale-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 6px solid #ff6e40;
            scroll-margin-top: 20px;
            transition: all 0.2s;
        }
        .escale-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f4f7f6;
            padding-bottom: 12px;
            margin-bottom: 15px;
        }
        .oaci {
            background-color: #1e3d59;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1em;
            letter-spacing: 0.5px;
        }
        .meta-info {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            font-size: 0.95em;
            background: #f8fafb;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #eef2f4;
            align-items: center;
        }
        .actions-btn {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        h2 { margin: 0; color: #1e3d59; font-size: 1.6em; }
        h3 { color: #ff6e40; margin-top: 18px; margin-bottom: 6px; font-size: 1.1em; display: flex; align-items: center; gap: 8px; }
        ul { margin: 0; padding-left: 20px; }
        li { margin-bottom: 4px; }
        
        /* Badges & Boutons */
        .badge-100ll {
            background-color: #0056b3;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
            display: inline-block;
        }
        .btn-vac, .btn-musee {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-vac { background-color: #ff6e40; }
        .btn-vac:hover { background-color: #e55b2b; }
        
        .btn-musee { background-color: #117a8b; }
        .btn-musee:hover { background-color: #0f6674; }
        
        .briefing {
            background-color: #fff9e6;
            border-left: 4px solid #ffcc00;
            padding: 12px 18px;
            margin-top: 20px;
            border-radius: 6px;
        }

        /* Bouton Retour en haut */
        .btn-retour-haut {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #ff6e40;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
            z-index: 1000;
            font-size: 0.9em;
        }
        .btn-retour-haut:hover {
            background-color: #1e3d59;
            transform: translateY(-3px);
        }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>

        <p>Informations utiles escales autour de Vannes-Meucon</p>

        <div class="liens-terrain" id="sommaire-fiches"></div>
    </div>

    <div id="liste-fiches"></div>
</div>

<a href="#accueil" class="btn-retour-haut">⬆️ Haut</a>

            ],
            briefing: "Effet de falaise en finale 25 par vent de Nord-Ouest. Respecter le TdP maritime."
        },
        {
            id: "lfst",
            oaci: "LFST",
            ville: "La Roche-sur-Yon",
            nomComplet: "La Roche-sur-Yon - Les Ajoncs",
            frequence: "118.925 MHz (AFIS)",
            has100LL: true,
            piste: [
                "<strong>QFU :</strong> 10 / 28",
                "<strong>Longueur & Revêtement :</strong> 1550 m x 30 m (Bitume)",
                "<strong>QFU préférentiel :</strong> Suivre les consignes AFIS en vigueur ou le vent."
            ],
            taxes: [
                "<strong>Paiement de la taxe :</strong> La taxe d'atterrissage se paye obligatoirement auprès des pompiers (SSLIA), juste avant d'accéder au restaurant.",
                "<strong>Carburant :</strong> 100LL / JET A-1 (Automate disponible)."
            ],
            restauration: [
                "<strong>Sur place :</strong> Restaurant \"L'Arc en ciel\" sur l'aérodrome. Tél : 02 51 07 04 39."
            ],
            briefing: "Accès facile au restaurant après le SSLIA. Attention aux oiseaux parfois nombreux près des pistes en hiver."
        },
        {
            id: "lfci",
            oaci: "LFCI",
            ville: "Lannion",
            nomComplet: "Lannion - Côte de Granit Rose",
            frequence: "118.950 MHz (AFIS)",
            has100LL: true,
            piste: [
                "<strong>QFU :</strong> 11 / 29",
                "<strong>Longueur & Revêtement :</strong> 1610 m x 30 m (Bitume)",
                "<strong>QFU préférentiel :</strong> Gérée selon le vent et les informations de la station AFIS."
            ],
            taxes: [
                "<strong>Taxe d'atterrissage :</strong> Oui (Règlement sur place).",
                "<strong>Carburant :</strong> 100LL / JET A-1."
            ],
            restauration: [
                "<strong>Sur place :</strong> Bar-restaurant de l'aéroport (vérifier les horaires d'ouverture de saison)."
            ],
            briefing: "Circuit de piste très encadré pour éviter le survol des habitations périphériques. Intégration rigoureuse requise."
        },
        {
            id: "lfru",
            oaci: "LFRU",
            ville: "Morlaix",

            ],
            taxes: [

            ],
            restauration: [

            ],
            briefing: "Attention à la proximité de la baie de Morlaix qui peut engendrer des brises côtières marquées et des changements de visibilité rapides. Activité para possible."
        },
        {
            id: "lfrs",
            oaci: "LFRS",
            ville: "Nantes",
            nomComplet: "Nantes Atlantique",
            frequence: "118.650 MHz (Tour)",
            has100LL: true,
            piste: [
                "<strong>QFU :</strong> 03 / 21",
                "<strong>Longueur & Revêtement :</strong> 2900 m x 45 m (Bitume)",
                "<strong>QFU préférentiel :</strong> Soumise aux instructions ATC (Terrain contrôlé CTR/TMA Classe D)."
            ],
            taxes: [

    // ==========================================
    // ⚙️ SCRIPT DE GÉNÉRATION & MOTEUR DE RECHERCHE
    // ==========================================
    
    escalesData.sort((a, b) => a.ville.localeCompare(b.ville));

    const sommaireContainer = document.getElementById('sommaire-fiches');
    const fichesContainer = document.getElementById('liste-fiches');
    const inputRecherche = document.getElementById('recherche');

    function genererInterface(dataFiltree) {
        sommaireContainer.innerHTML = '';
        fichesContainer.innerHTML = '';

        if(dataFiltree.length === 0) {
            sommaireContainer.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:#777;'>Aucun terrain trouvé.</p>";
            return;
        }

        dataFiltree.forEach(ad => {
            // 1. Sommaire
            const btn = document.createElement('a');
            btn.href = `#${ad.id}`;
            btn.className = 'btn-raccourci';
            btn.innerHTML = `${ad.ville} (${ad.oaci})`;
            sommaireContainer.appendChild(btn);

            // 2. Fiche
            const mapperLi = info => `<li>${info}</li>`;
            const badge100LL = ad.has100LL ? `<span class="badge-100ll">⛽ 100LL</span>` : '';
            
            // Si l'aérodrome possède un musée, on prépare son bouton HTML
            const boutonMusee = ad.siteMusee ? `<a href="${ad.siteMusee}" target="_blank" class="btn-musee">🏛️ Site du Musée</a>` : '';

            const card = document.createElement('div');
            card.className = 'escale-card';
            card.id = ad.id;
            card.innerHTML = `
                <div class="escale-header">
                    <h2>${ad.nomComplet}</h2>
                    <span class="oaci">${ad.oaci}</span>
                </div>
                <div class="meta-info">
                    <div><strong>📻 Radio :</strong> ${ad.frequence}</div>
                    <div>${badge100LL}</div>
                    <div class="actions-btn">
                        ${boutonMusee}
                        <a href="https://www.sia.aviation-civile.gouv.fr" target="_blank" class="btn-vac">📄 Carte VAC</a>
                    </div>
                </div>
                <h3>🛫 Caractéristiques Piste(s)</h3>
                <ul>${ad.piste.map(mapperLi).join('')}</ul>
                <h3>💳 Taxes & Services</h3>
                <ul>${ad.taxes.map(mapperLi).join('')}</ul>
                <h3>🍽️ Restauration</h3>
                <ul>${ad.restauration.map(mapperLi).join('')}</ul>
                <div class="briefing">
                    <strong>🎯 Le Briefing des Copains :</strong> ${ad.briefing}
                </div>
            `;
            fichesContainer.appendChild(card);
        });
    }

    inputRecherche.addEventListener('input', (e) => {
        const texte = e.target.value.toLowerCase().trim();
        const dataFiltree = escalesData.filter(ad => 
            ad.ville.toLowerCase().includes(texte) || 
            ad.oaci.toLowerCase().includes(texte) ||
            ad.nomComplet.toLowerCase().includes(texte)
        );
        genererInterface(dataFiltree);
    });

    genererInterface(escalesData);
</script>

</body>
</html>
